    <script>
      // Redirect to unified domain in production, allowing localhost, 127.0.0.1, local network IPs, and *.local
      (function() {
        var targetDomain = '%VITE_REDIRECT_DOMAIN%';
        // If the variable is not set or Vite doesn't replace the placeholder, skip redirect
        if (!targetDomain || targetDomain.startsWith('%') || targetDomain === 'undefined') return;
        
        // Clean targetDomain to ensure it is just the hostname (no http/https or trailing slash)
        targetDomain = targetDomain.replace(/^https?:\/\//i, '').replace(/\/+$/, '');
        if (!targetDomain) return;

        var host = window.location.hostname;
        var isLocalIp = /^(192\.168\.|10\.|172\.(1[6-9]|2[0-9]|3[0-1])\.)/.test(host);
        
        if (host !== targetDomain && 
            host !== 'localhost' && 
            host !== '127.0.0.1' &&
            !isLocalIp &&
            !host.endsWith('.local')) {
          window.location.replace('https://' + targetDomain + window.location.pathname + window.location.search + window.location.hash);
        }
      })();
    </script>
